<!DOCTYPE html>

<head>
    <meta charset="UTF-8" />
    <title>Nonogram</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js"></script>
</head>

<body>
    <div id="title-container">
        <h1>Puzzle Nonograma</h1>
    </div>
    <div id="diff-selector-container">
        <label for="dificultad">Selecciona la dificultad:</label>
        <select class="selector" name="dificultad" id="diff-selector">
            <option value="facil">facil</option>
            <option value="intermedio">intermedio</option>
            <option value="dificil">dificil</option>
    </select>
    </div>
    <div id="size-selector-container">
        <label for="tamano">Selecciona el tamaño:</label>
        <select class="selector" name="tamano" id="diff-tamano">
            <option value="5x5">5x5</option>
            <option value="5x10">5x10</option>
            <option value="5x15">5x15</option>
            <option value="5x20">5x20</option>
            <option value="10x10">10x10</option>
            <option value="10x15">10x15</option>
            <option value="10x20">10x20</option>
            <option value="15x15">15x15</option>
            <option value="15x20">15x20</option>
            <option value="20x20">20x20</option>
    </select>
    </div>

    <div>
        <button id="start-button">Iniciar Juego</button>
    </div>

</body>
